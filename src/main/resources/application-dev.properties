quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:profile.db
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=4
quarkus.datasource.jdbc.acquisition-timeout=30S
quarkus.hibernate-orm.database.generation=update

quarkus.http.port=9092

profile.fixtures.enabled=true
profile.media.storage.provider=local
profile.media.local-storage-path=./storage/profile-media
profile.media.local-public-base-url=http://localhost:9092/profile-service/media/files


# Dev UI CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:8088,http://127.0.0.1:8088,http://localhost:8000,http://127.0.0.1:8000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-user-id
