quarkus.http.root-path=/profile-service

profile.media.max-photos=${PROFILE_MEDIA_MAX_PHOTOS:20}
profile.media.max-videos=${PROFILE_MEDIA_MAX_VIDEOS:5}
profile.media.default-storage-quota-bytes=${PROFILE_MEDIA_DEFAULT_STORAGE_QUOTA_BYTES:524288000}
profile.media.storage.provider=${PROFILE_MEDIA_STORAGE_PROVIDER:fake}
profile.media.upload-url-ttl=${PROFILE_MEDIA_UPLOAD_URL_TTL:15m}
profile.media.fake-upload-base-url=${PROFILE_MEDIA_FAKE_UPLOAD_BASE_URL:https://storage.local/upload}

profile.fixtures.enabled=${PROFILE_FIXTURES_ENABLED:false}
