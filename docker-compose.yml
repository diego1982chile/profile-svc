version: '3.8'
services:
  profile-service:
    build:
      context: target/quarkus-app
      dockerfile: ${PWD}/src/main/docker/Dockerfile.local
    container_name: container_profile-service
    ports:
      - "9092:8080"
      - "8012:8000"
    environment:
      QUARKUS_PROFILE: docker
      JAVA_DEBUG: "true"
      JAVA_DEBUG_PORT: "*:8000"
      PROFILE_HTTP_MAX_BODY_SIZE: ${PROFILE_HTTP_MAX_BODY_SIZE:-500M}
      PROFILE_FIXTURES_ENABLED: ${PROFILE_FIXTURES_ENABLED:-true}
      PROFILE_MEDIA_STORAGE_PROVIDER: ${PROFILE_MEDIA_STORAGE_PROVIDER:-local}
      PROFILE_MEDIA_FAKE_UPLOAD_BASE_URL: ${PROFILE_MEDIA_FAKE_UPLOAD_BASE_URL:-https://storage.local/upload}
      PROFILE_MEDIA_LOCAL_STORAGE_PATH: ${PROFILE_MEDIA_LOCAL_STORAGE_PATH:-/deployments/storage/profile-media}
      PROFILE_MEDIA_LOCAL_PUBLIC_BASE_URL: ${PROFILE_MEDIA_LOCAL_PUBLIC_BASE_URL:-http://localhost:9092/profile-service/media/files}
      PROFILE_MEDIA_UPLOAD_URL_TTL: ${PROFILE_MEDIA_UPLOAD_URL_TTL:-15m}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:8088,http://127.0.0.1:8088,http://localhost:8000,http://127.0.0.1:8000}
    volumes:
      - ${PWD}/db/profile.db:/deployments/profile.db
      - ${PWD}/storage/profile-media:/deployments/storage/profile-media
